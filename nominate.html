<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CFO NEXTGEN Registration</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#f4f7fb;
color:#1e293b;
}

/* ===== NAVBAR ===== */
.navbar {
position: fixed;
top: 0;
left: 0;
width: 100%;
background: #ffffff;
box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
z-index: 1000;
}

.nav-container {
  max-width: 1300px;
  margin: auto;
  padding: 18px 20px; /* ✅ reduced for mobile */
  display: flex;
  align-items: center;
  justify-content: flex-end;
}

nav {
  display: flex;
  gap: 20px; /* ✅ smaller gap */
  align-items: center;
}

nav a {
text-decoration: none;
color: #1e293b;
font-size: 14px;
font-weight: 500;
}

.nav-cta {
background: #27bfcc;
color: #fff !important;
padding: 8px 16px; /* ✅ responsive */
border-radius:5px;
}

/* ===== CENTER LAYOUT ===== */
.registration-wrapper{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:100px 15px 30px; /* ✅ better spacing */
}

/* ===== FORM CARD ===== */
.form-container{
width:100%;
max-width:750px;
background:#ffffff;
padding:30px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* HEADER */
.form-container h2{
font-size:24px;
margin-bottom:6px;
}

.form-container span{
color:#64748b;
font-size:13px;
margin-bottom:15px;
display:block;
}

/* FORM */
.form-group{
margin-bottom:16px;
}

.form-group label{
font-size:13px;
color:#475569;
margin-bottom:6px;
display:block;
}

.input-box{
position:relative;
}

.input-box i{
position:absolute;
left:12px;
top:50%;
transform:translateY(-50%);
color:#94a3b8;
font-size:14px;
}

.input-box input,
.input-box select{
width:100%;
height:42px;
padding:0 12px 0 36px;
border-radius:6px;
border:1px solid #e2e8f0;
background:#fff;
font-size:14px;
}

/* FOCUS */
.input-box input:focus,
.input-box select:focus{
outline:none;
border-color:#0ea5e9;
box-shadow:0 0 0 3px rgba(14,165,233,.12);
}

/* DISCLAIMER */
.disclaimer-content{
background:#f8fafc;
border:1px solid #e2e8f0;
border-radius:8px;
padding:12px;
max-height:140px;
overflow:auto;
font-size:12px;
color:#475569;
}

.disclaimer-content h4{
margin-bottom:6px;
font-size:14px;
}

.agree-check{
margin-top:10px;
font-size:13px;
display:flex;
gap:8px;
align-items:center;
}

/* BUTTON */
.submit-btn button{
width:100%;
height:42px;
border:none;
background:#0ea5e9;
color:#fff;
border-radius:6px;
cursor:pointer;
font-weight:600;
margin-top:15px;
font-size:14px;
}

.submit-btn button:hover{
background:#0284c7;
}

.submit-btn button:disabled{
background:#94a3b8;
cursor:not-allowed;
}

/* TWO COLUMN */
.form-row{
display:flex;
gap:12px;
}

.form-row .form-group{
flex:1;
}

/* ===== TABLET ===== */
@media(max-width:992px){
.form-container{
padding:25px;
}
}

/* ===== MOBILE ===== */
@media(max-width:768px){

.nav-container{
padding:15px;
}

nav{
gap:12px;
}

.registration-wrapper{
padding:90px 10px 20px;
}

.form-container{
padding:20px;
border-radius:8px;
}

.form-container h2{
font-size:20px;
}

.form-row{
flex-direction:column;
}

.input-box input,
.input-box select{
height:40px;
}

.submit-btn button{
height:40px;
}
}

/* ===== SMALL MOBILE ===== */
@media(max-width:480px){

nav a{
font-size:13px;
}

.nav-cta{
padding:6px 12px;
font-size:12px;
}

.form-container{
padding:18px;
}

.disclaimer-content{
font-size:11px;
}
}
</style>
</head>

<body>

<header class="navbar">
<div class="nav-container">
<nav>
<a href="index.html">Home</a>
<a href="#" class="nav-cta">Register</a>
</nav>
</div>
</header>

<div class="registration-wrapper">

<div class="form-container">

<h2>Nominate Now</h2>
<span>Please fill in your details to confirm participation</span>

<form action="contactform1.php" method="post" enctype="multipart/form-data" class="reg-form">

<div class="form-group">
<label>Full Name</label>
<div class="input-box">
<i class="fa fa-user"></i>
<input type="text" id="name" name="name" required>
</div>
</div>

<div class="form-group">
<label>Email</label>
<div class="input-box">
<i class="fa fa-envelope"></i>
<input type="email" id="email" name="email" required>
</div>
</div>

<div class="form-group">
<label>Mobile</label>
<div class="input-box">
<i class="fa fa-phone"></i>
<input type="text" id="number" name="number" required>
</div>
</div>

<div class="form-group">
<label>Company</label>
<div class="input-box">
<i class="fa fa-building"></i>
<input type="text" id="company" name="company" required>
</div>
</div>

<div class="form-group">
<label>Designation</label>
<div class="input-box">
<i class="fa fa-briefcase"></i>
<input type="text" id="designation" name="designation" required>
</div>
</div>

<div class="form-group">
<label>Category</label>
<div class="input-box">
<i class="fa fa-layer-group"></i>
<select id="category" name="category" required>
<option value=" Best Finance Strategy of the Year - Organizational Award"> Best Finance Strategy of the Year - Organizational Award</option>
<option value=" Best Finance Transformation Initiative - Organizational Award">  Best Finance Transformation Initiative - Organizational Award </option>
<option value=" Best Fintech Organization - Organizational Award"> Best Fintech Organization - Organizational Award</option>
<option value=" Most Innovative Finance Team - Organizational Award"> Most Innovative Finance Team - Organizational Award</option>
<option value=" Best Use of AI in Finance - Organizational Award" name="category"> Best Use of AI in Finance - Organizational Award</option>
<option value=" Best ESG Strategy - Organizational Award"> Best ESG Strategy - Organizational Award</option>
<option value=" Best Digital Finance Team - Organizational Award"> Best Digital Finance Team - Organizational Award </option>

<option value=" CFO of the Year - Individual Award"> CFO of the Year - Individual Award </option>
<option value=" Best Finance Leader - Individual Award">  Best Finance Leader - Individual Award </option>
<option value=" Technology Driven CFO - Individual Award"> Technology Driven CFO - Individual Award </option>
<option value=" Finance Transformation Leader - Individual Award"> Finance Transformation Leader - Individual Award </option>
<option value=" Young & Inspiring Leader - Individual Award"> Young & Inspiring Leader - Individual Award </option>
<option value=" Crisis Management Excellence - Individual Award"> Crisis Management Excellence - Individual Award </option>
<option value=" Impactful Finance Leader - Individual Award"> Impactful Finance Leader - Individual Award </option>

</select>
</div>
</div>

<div class="form-row">

  <div class="form-group">
    <label>Delegate Fee</label>
    <div class="input-box">
      <i class="fa fa-money-bill"></i>
      <select name="delegate_price" required>
                <option>INR 15,000 + taxes</option>
            </select>
         
    </div>
  </div>

<div class="form-group">
  <label>Nominee Fee</label>
  <div class="input-box">
    <i class="fa fa-coins"></i>
     <select name="nomination_price" required>
                <option>Individual Award INR - 15,000 + taxes</option>
                  <option>Organizational Award INR - 25,000 + taxes</option>
            </select>
  </div>
</div>

</div>

<!-- DISCLAIMER -->
<div class="form-group">
<div class="disclaimer-content">
<h4>Disclaimer</h4>
<p>Registration fee is non-refundable. Credit note valid for 1 year.</p>
<p>If you are a solution provider, register as partner only.</p>
</div>

<label class="agree-check">
<input type="checkbox" id="agreeCheck">
<span>I agree</span>
</label>
</div>

<div class="submit-btn">
<button type="submit" id="btn" disabled>REGISTER</button>
</div>

</form>

</div>

</div>

<script>
const check = document.getElementById("agreeCheck");
const btn = document.getElementById("btn");

check.addEventListener("change",()=>{
btn.disabled = !check.checked;
});
</script>

</body>
</html>
